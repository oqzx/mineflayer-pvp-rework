name: CI

on:
  push:
    branches: [main, dev, rewrite]
  pull_request:
    branches: [main, dev, rewrite]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prettier
        id: prettier
        run: npm run format

      - name: ESLint
        id: eslint
        run: npm run lint:fix

      - name: TypeScript
        id: typecheck
        run: npm run typecheck
